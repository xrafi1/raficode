<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinApp - Web Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            DEFAULT: '#6C48FA', // The exact purple from the UI
                            light: '#8E72FC',
                            bg: '#F3F4F6'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #e5e7eb; }
        .app-container { max-width: 480px; margin: 0 auto; background-color: #F4F5F9; min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div class="app-container pb-20">
    
    <header class="bg-brand text-white px-6 pt-10 pb-20 rounded-b-3xl relative">
        <div class="flex justify-between items-center">
            <button class="text-2xl"><i class="fa-solid fa-bars"></i></button>
            
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-atom text-2xl"></i>
                <h1 class="text-xl font-semibold tracking-wide">Finapp</h1>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="relative">
                    <i class="fa-regular fa-bell text-xl"></i>
                    <span class="absolute -top-1 -right-1 bg-red-500 text-xs w-4 h-4 flex items-center justify-center rounded-full">4</span>
                </div>
                <div class="relative w-8 h-8 rounded-full bg-gray-300 overflow-hidden border-2 border-white">
                    <img src="https://ui-avatars.com/api/?name=User&background=random" alt="User Avatar" class="w-full h-full object-cover">
                    <span class="absolute -top-1 -right-1 bg-red-500 text-[10px] w-3 h-3 flex items-center justify-center rounded-full text-white">6</span>
                </div>
            </div>
        </div>
    </header>

    <main class="px-5 -mt-12 relative z-10">
        <div class="bg-white rounded-2xl p-6 shadow-sm flex justify-between items-center">
            <div>
                <p class="text-gray-600 font-medium mb-1">Wallet Balance</p>
                <h2 class="text-3xl font-bold text-gray-900">₹ 2562.50</h2>
            </div>
            <button onclick="initiateRazorpayTopUp()" class="w-14 h-14 bg-brand bg-opacity-10 text-brand rounded-2xl flex items-center justify-center text-3xl font-light hover:bg-brand hover:text-white transition-colors">
                +
            </button>
        </div>

        <div class="bg-white rounded-2xl p-6 mt-5 shadow-sm">
            <div class="grid grid-cols-4 gap-y-6 gap-x-2">
                
                <div class="flex flex-col items-center gap-2 cursor-pointer hover:opacity-80">
                    <div class="w-14 h-14 bg-brand text-white rounded-2xl flex items-center justify-center text-xl shadow-md">
                        <i class="fa-solid fa-mobile-screen"></i>
                    </div>
                    <span class="text-xs font-medium text-gray-700 text-center">Prepaid</span>
                </div>

                <div class="flex flex-col items-center gap-2 cursor-pointer hover:opacity-80">
                    <div class="w-14 h-14 bg-brand text-white rounded-2xl flex items-center justify-center text-xl shadow-md">
                        <i class="fa-solid fa-tv"></i>
                    </div>
                    <span class="text-xs font-medium text-gray-700 text-center">Dth</span>
                </div>

                <div class="flex flex-col items-center gap-2 cursor-pointer hover:opacity-80">
                    <div class="w-14 h-14 bg-brand text-white rounded-2xl flex items-center justify-center text-xl shadow-md">
                        <i class="fa-solid fa-bolt"></i>
                    </div>
                    <span class="text-xs font-medium text-gray-700 text-center">Electricity</span>
                </div>

                <div class="flex flex-col items-center gap-2 cursor-pointer hover:opacity-80">
                    <div class="w-14 h-14 bg-brand text-white rounded-2xl flex items-center justify-center text-xl shadow-md">
                        <i class="fa-solid fa-car"></i>
                    </div>
                    <span class="text-xs font-medium text-gray-700 text-center">FasTag</span>
                </div>

                <div class="flex flex-col items-center gap-2 cursor-pointer hover:opacity-80">
                    <div class="w-14 h-14 bg-brand text-white rounded-2xl flex items-center justify-center text-xl shadow-md">
                        <i class="fa-brands fa-google-play"></i>
                    </div>
                    <span class="text-xs font-medium text-gray-700 text-center">Google Play</span>
                </div>

                <div class="flex flex-col items-center gap-2 cursor-pointer hover:opacity-80">
                    <div class="w-14 h-14 bg-brand text-white rounded-2xl flex items-center justify-center text-xl shadow-md">
                        <i class="fa-solid fa-shield-halved"></i>
                    </div>
                    <span class="text-xs font-medium text-gray-700 text-center">Insurance</span>
                </div>

                <div class="flex flex-col items-center gap-2 cursor-pointer hover:opacity-80">
                    <div class="w-14 h-14 bg-brand text-white rounded-2xl flex items-center justify-center text-xl shadow-md">
                        <i class="fa-regular fa-calendar"></i>
                    </div>
                    <span class="text-xs font-medium text-gray-700 text-center">EMI</span>
                </div>

                <div class="flex flex-col items-center gap-2 cursor-pointer hover:opacity-80">
                    <div class="w-14 h-14 bg-brand text-white rounded-2xl flex items-center justify-center text-xl shadow-md">
                        <i class="fa-solid fa-info"></i>
                    </div>
                    <span class="text-xs font-medium text-gray-700 text-center">See All</span>
                </div>

            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full max-w-[480px] bg-white border-t border-gray-200 flex justify-between px-6 py-3 pb-6 rounded-t-2xl z-50">
        
        <div class="flex flex-col items-center text-brand relative w-1/4 cursor-pointer">
            <div class="absolute -top-3 w-10 h-[3px] bg-brand rounded-b-md"></div>
            <i class="fa-solid fa-house text-xl mb-1 mt-2"></i>
            <span class="text-[10px] font-medium">Home</span>
        </div>

        <div class="flex flex-col items-center text-gray-400 hover:text-brand w-1/4 cursor-pointer transition-colors">
            <i class="fa-solid fa-file-invoice text-xl mb-1 mt-2"></i>
            <span class="text-[10px] font-medium">Margin</span>
        </div>

        <div class="flex flex-col items-center text-gray-400 hover:text-brand w-1/4 cursor-pointer transition-colors">
            <i class="fa-solid fa-credit-card text-xl mb-1 mt-2"></i>
            <span class="text-[10px] font-medium">History</span>
        </div>

        <div class="flex flex-col items-center text-gray-400 hover:text-brand w-1/4 cursor-pointer transition-colors">
            <i class="fa-solid fa-gear text-xl mb-1 mt-2"></i>
            <span class="text-[10px] font-medium">Settings</span>
        </div>

    </nav>

</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</body>
</html>
