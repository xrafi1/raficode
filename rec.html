<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinApp - Web Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: { brand: { DEFAULT: '#6C48FA', light: '#8E72FC', bg: '#F3F4F6', text: '#333333' } }
                }
            }
        }
    </script>
    <style>
        body { background-color: #e5e7eb; }
        .app-container { max-width: 480px; margin: 0 auto; background-color: #F4F5F9; min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); overflow-x: hidden; }
        .hidden { display: none !important; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

<div class="app-container pb-20">
    
    <header id="main-header" class="bg-brand text-white px-6 pt-10 pb-20 rounded-b-3xl relative transition-all">
        <div class="flex justify-between items-center">
            <button onclick="goHome()" class="text-2xl"><i class="fa-solid fa-house"></i></button>
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-atom text-2xl"></i>
                <h1 class="text-xl font-semibold tracking-wide">Finapp</h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="relative w-8 h-8 rounded-full bg-gray-300 overflow-hidden border-2 border-white">
                    <img src="https://ui-avatars.com/api/?name=Rafi&background=random" alt="User">
                </div>
            </div>
        </div>
    </header>

    <div id="wallet-card" class="px-5 -mt-12 relative z-10 transition-all">
        <div class="bg-white rounded-2xl p-6 shadow-sm flex justify-between items-center">
            <div>
                <p class="text-gray-600 font-medium mb-1">Wallet Balance</p>
                <h2 class="text-3xl font-bold text-gray-900" id="wallet-balance">₹ 2562.50</h2>
            </div>
            <button onclick="initiateRazorpayTopUp()" class="w-14 h-14 bg-brand bg-opacity-10 text-brand rounded-2xl flex items-center justify-center text-3xl hover:bg-brand hover:text-white transition-colors">
                +
            </button>
        </div>
    </div>

    <main id="view-home" class="px-5 mt-5 relative z-10">
        <div class="bg-white rounded-2xl p-6 shadow-sm">
            <div class="grid grid-cols-4 gap-y-6 gap-x-2">
                <div onclick="openService('prepaid')" class="flex flex-col items-center gap-2 cursor-pointer hover:opacity-80 transition-opacity">
                    <div class="w-14 h-14 bg-brand text-white rounded-2xl flex items-center justify-center text-xl shadow-md"><i class="fa-solid fa-mobile-screen"></i></div>
                    <span class="text-[11px] font-medium text-gray-700 text-center">Prepaid</span>
                </div>
                <div onclick="openService('dth')" class="flex flex-col items-center gap-2 cursor-pointer hover:opacity-80 transition-opacity">
                    <div class="w-14 h-14 bg-brand text-white rounded-2xl flex items-center justify-center text-xl shadow-md"><i class="fa-solid fa-tv"></i></div>
                    <span class="text-[11px] font-medium text-gray-700 text-center">Dth</span>
                </div>
                <div onclick="openService('electricity')" class="flex flex-col items-center gap-2 cursor-pointer hover:opacity-80 transition-opacity">
                    <div class="w-14 h-14 bg-brand text-white rounded-2xl flex items-center justify-center text-xl shadow-md"><i class="fa-solid fa-bolt"></i></div>
                    <span class="text-[11px] font-medium text-gray-700 text-center">Electricity</span>
                </div>
                <div onclick="openService('fastag')" class="flex flex-col items-center gap-2 cursor-pointer hover:opacity-80 transition-opacity">
                    <div class="w-14 h-14 bg-brand text-white rounded-2xl flex items-center justify-center text-xl shadow-md"><i class="fa-solid fa-car"></i></div>
                    <span class="text-[11px] font-medium text-gray-700 text-center">FasTag</span>
                </div>
            </div>
        </div>
    </main>

    <main id="view-prepaid" class="px-5 mt-5 relative z-10 hidden">
        <div class="bg-white rounded-2xl p-6 shadow-sm">
            <div class="flex items-center gap-3 mb-6 border-b pb-4">
                <button onclick="goHome()" class="text-gray-500"><i class="fa-solid fa-arrow-left"></i></button>
                <h3 class="text-lg font-semibold text-gray-800">Mobile Recharge</h3>
            </div>

            <form id="recharge-form" onsubmit="handleRechargeSubmit(event)">
                
                <div class="mb-4">
                    <label class="block text-xs font-medium text-gray-500 mb-1">Mobile Number</label>
                    <input type="tel" id="mobile-number" oninput="autoDetectOperator(this.value)" required maxlength="10" placeholder="Enter 10 digit number" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand font-semibold tracking-wider">
                </div>

                <div class="mb-4">
                    <label class="block text-xs font-medium text-gray-500 mb-1">Select Operator</label>
                    <select id="operator-select" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-brand bg-white transition-colors duration-300">
                        <option value="">-- Select Operator --</option>
                        <option value="airtel">Airtel</option>
                        <option value="jio">Jio</option>
                        <option value="vodafoneIdea">VI (Vodafone Idea)</option>
                        <option value="bsnlTopup">BSNL Topup</option>
                    </select>
                </div>

                <div class="mb-6 relative">
                    <div class="flex justify-between items-end mb-1">
                        <label class="block text-xs font-medium text-gray-500">Amount (₹)</label>
                        <button type="button" onclick="openPlans()" class="text-xs font-semibold text-brand hover:underline">Browse Plans</button>
                    </div>
                    <input type="number" id="recharge-amount" required placeholder="Enter Amount" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand font-bold text-lg">
                </div>

                <div id="api-message" class="text-sm font-medium mb-4 hidden"></div>

                <button type="submit" id="submit-btn" class="w-full bg-brand text-white py-3.5 rounded-xl font-semibold shadow-md shadow-brand/30 hover:bg-brand-light transition-colors">
                    Proceed to Recharge
                </button>
            </form>
        </div>
    </main>

    <main id="view-plans" class="absolute top-0 left-0 w-full min-h-screen bg-[#F4F5F9] z-50 hidden pb-6">
        <div class="bg-white px-5 py-4 flex items-center gap-4 shadow-sm sticky top-0 z-10">
            <button onclick="closePlans()" class="text-brand text-xl"><i class="fa-solid fa-chevron-left"></i></button>
            <h2 class="text-lg font-semibold text-gray-800">Choose Plan</h2>
        </div>

        <div class="px-4 mt-4">
            <div class="bg-white rounded-xl p-4 shadow-sm flex items-center justify-between border border-gray-100">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold text-lg" id="plan-op-logo">Jio</div>
                    <div>
                        <h3 class="font-bold text-gray-800 tracking-wide" id="plan-number-display">8822112236</h3>
                        <p class="text-xs text-gray-500 mt-0.5" id="plan-op-name">Reliance Jio Infocomm Limited • India</p>
                    </div>
                </div>
                <button onclick="closePlans()" class="text-gray-400 hover:text-brand"><i class="fa-regular fa-pen-to-square"></i></button>
            </div>

            <div class="mt-4 bg-white rounded-xl px-4 py-3 border border-gray-100 shadow-sm">
                <input type="text" placeholder="Search plan by amount" class="w-full text-sm outline-none text-gray-700 bg-transparent">
            </div>

            <div class="flex items-center justify-between mt-4 mb-2">
                <div class="flex gap-2 overflow-x-auto hide-scroll w-full pb-1">
                    <button class="whitespace-nowrap px-4 py-1.5 bg-white border border-gray-200 rounded-full text-sm font-medium text-brand shadow-sm">Smart Phone</button>
                    <button class="whitespace-nowrap px-4 py-1.5 bg-transparent text-gray-500 rounded-full text-sm font-medium">Popular</button>
                    <button class="whitespace-nowrap px-4 py-1.5 bg-transparent text-gray-500 rounded-full text-sm font-medium">Entertainment</button>
                </div>
            </div>

            <div id="plans-loading" class="mt-10 flex flex-col items-center justify-center hidden">
                <i class="fa-solid fa-circle-notch fa-spin text-brand text-3xl mb-3"></i>
                <p class="text-gray-500 text-sm font-medium">Loading best offers for you...</p>
            </div>

            <div id="plans-container" class="mt-3 space-y-4 pb-10">
                </div>
        </div>
    </main>

    <nav id="bottom-nav" class="fixed bottom-0 w-full max-w-[480px] bg-white border-t border-gray-200 flex justify-between px-6 py-3 pb-6 rounded-t-2xl z-40 transition-transform">
        <div onclick="goHome()" class="flex flex-col items-center text-brand relative w-1/4 cursor-pointer">
            <i class="fa-solid fa-house text-xl mb-1 mt-2"></i>
            <span class="text-[10px] font-medium">Home</span>
        </div>
        <div class="flex flex-col items-center text-gray-400 hover:text-brand w-1/4 cursor-pointer transition-colors">
            <i class="fa-solid fa-file-invoice text-xl mb-1 mt-2"></i>
            <span class="text-[10px] font-medium">Margin</span>
        </div>
        <div class="flex flex-col items-center text-gray-400 hover:text-brand w-1/4 cursor-pointer transition-colors">
            <i class="fa-solid fa-credit-card text-xl mb-1 mt-2"></i>
            <span class="text-[10px] font-medium">History</span>
        </div>
    </nav>

</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
    // ==============================================================
    // CONFIGURATION
    // ==============================================================
    const API_KEY = "dVz7nEga8Yu832qw6TME1kut"; 
    const BASE_URL = "https://backend.oneapi.in";

    // View Elements
    const viewHome = document.getElementById('view-home');
    const viewPrepaid = document.getElementById('view-prepaid');
    const viewPlans = document.getElementById('view-plans');
    const bottomNav = document.getElementById('bottom-nav');
    const header = document.getElementById('main-header');
    const walletCard = document.getElementById('wallet-card');

    // ==============================================================
    // NAVIGATION LOGIC
    // ==============================================================
    function goHome() {
        viewPrepaid.classList.add('hidden');
        viewPlans.classList.add('hidden');
        viewHome.classList.remove('hidden');
        bottomNav.classList.remove('translate-y-full');
        header.classList.remove('hidden');
        walletCard.classList.remove('hidden');
        document.getElementById('api-message').classList.add('hidden');
    }

    function openService(serviceName) {
        if(serviceName === 'prepaid') {
            viewHome.classList.add('hidden');
            viewPrepaid.classList.remove('hidden');
        } else {
            alert("This module is under construction.");
        }
    }

    // ==============================================================
    // AUTO DETECT OPERATOR
    // ==============================================================
    function autoDetectOperator(number) {
        const selectBox = document.getElementById('operator-select');
        number = number.replace(/\D/g,'');
        
        if (number.length >= 4) {
            const prefix2 = number.substring(0, 2);
            let detectedOpCode = "";

            if (['98','99','90','89','88','81'].includes(prefix2)) detectedOpCode = "airtel";
            else if (['60','69','70','79','83','87'].includes(prefix2)) detectedOpCode = "jio";
            else if (['97','96','95','84','82','80'].includes(prefix2)) detectedOpCode = "vodafoneIdea";
            else if (['94','89'].includes(prefix2)) detectedOpCode = "bsnlTopup";

            if (detectedOpCode) {
                selectBox.value = detectedOpCode;
                selectBox.classList.add('border-green-500', 'bg-green-50');
                setTimeout(() => selectBox.classList.remove('border-green-500', 'bg-green-50'), 800);
            }
        }
    }

    // ==============================================================
    // PLAN BROWSER LOGIC (ROFFER API)
    // ==============================================================
    function openPlans() {
        const number = document.getElementById('mobile-number').value;
        const opCode = document.getElementById('operator-select').value;

        if(number.length !== 10) return alert("Please enter a 10-digit number first.");
        if(!opCode) return alert("Please select an operator first.");

        // Setup UI
        document.getElementById('plan-number-display').innerText = number;
        document.getElementById('plan-op-name').innerText = opCode.toUpperCase() + " • India";
        
        // Setup Logo Color
        const logo = document.getElementById('plan-op-logo');
        if(opCode === 'jio') { logo.innerText='Jio'; logo.className='w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold text-lg'; }
        else if(opCode === 'airtel') { logo.innerText='airtel'; logo.className='w-12 h-12 bg-red-600 rounded-full flex items-center justify-center text-white font-bold text-[10px]'; }
        else if(opCode === 'vodafoneIdea') { logo.innerText='Vi'; logo.className='w-12 h-12 bg-red-500 rounded-full flex items-center justify-center text-white font-bold text-xl border-2 border-yellow-400'; }
        else { logo.innerText=opCode.substring(0,3).toUpperCase(); logo.className='w-12 h-12 bg-gray-800 rounded-full flex items-center justify-center text-white font-bold text-lg'; }

        // Switch View
        bottomNav.classList.add('translate-y-full'); // Hide bottom nav
        header.classList.add('hidden');
        walletCard.classList.add('hidden');
        viewPrepaid.classList.add('hidden');
        viewPlans.classList.remove('hidden');

        fetchPlans(number, opCode);
    }

    function closePlans() {
        viewPlans.classList.add('hidden');
        viewPrepaid.classList.remove('hidden');
        header.classList.remove('hidden');
        walletCard.classList.remove('hidden');
        bottomNav.classList.remove('translate-y-full');
    }

    async function fetchPlans(number, opCode) {
        const container = document.getElementById('plans-container');
        const loader = document.getElementById('plans-loading');
        
        container.innerHTML = '';
        loader.classList.remove('hidden');

        try {
            // Using CORS Proxy for POST Request
            const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(`${BASE_URL}/recharge-related/roffer`);
            
            const response = await fetch(proxyUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ apiKey: API_KEY, number: parseInt(number), opCode: opCode })
            });
            
            const result = await response.json();
            loader.classList.add('hidden');

            if(result.success && result.data && result.data.length > 0) {
                renderPlans(result.data);
            } else {
                container.innerHTML = `
                    <div class="text-center p-6 bg-white rounded-xl shadow-sm">
                        <i class="fa-solid fa-folder-open text-gray-300 text-4xl mb-2"></i>
                        <p class="text-gray-500 font-medium">No special offers found for this number.</p>
                        <button onclick="closePlans()" class="mt-4 px-4 py-2 bg-brand text-white rounded-lg text-sm">Enter Amount Manually</button>
                    </div>`;
            }
        } catch (error) {
            console.error("Roffer Error:", error);
            loader.classList.add('hidden');
            container.innerHTML = `<div class="text-center p-4 text-red-500 bg-red-50 rounded-xl">Network Error. Please try again.</div>`;
        }
    }

    function renderPlans(plans) {
        const container = document.getElementById('plans-container');
        
        plans.forEach((plan, index) => {
            // Parsing Logic to extract Validity and Data from text
            let validity = "NA";
            let dataAmount = "NA";
            
            const desc = (plan.logdesc + " " + plan.ofrtext).toLowerCase();
            
            // Regex to find "28 days", "1 Month", etc.
            const valMatch = desc.match(/(\d+)\s*(days|d|month|m)/i);
            if(valMatch) validity = valMatch[1] + " " + valMatch[2].replace('d','days').replace('m','months');

            // Regex to find "1.5GB/day", "2 GB", etc.
            const dataMatch = desc.match(/(\d+(\.\d+)?)\s*(gb|mb)(\/day|\/d)?/i);
            if(dataMatch) dataAmount = dataMatch[0].toUpperCase();

            const cardHtml = `
            <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 relative overflow-hidden">
                <div class="flex justify-between items-start mb-3">
                    <h3 class="text-3xl font-bold text-gray-900">₹${plan.price}</h3>
                    <div class="text-right">
                        <p class="text-[10px] text-gray-400 uppercase tracking-wide font-semibold">Validity</p>
                        <p class="font-bold text-gray-800">${validity}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-gray-400 uppercase tracking-wide font-semibold">Data</p>
                        <p class="font-bold text-gray-800">${dataAmount}</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-2 mb-4">
                    <span class="bg-blue-100 text-blue-700 text-xs font-bold px-2 py-0.5 rounded flex items-center gap-1"><i class="fa-solid fa-bolt"></i> 5G</span>
                    <span class="text-xs text-gray-600 font-medium line-clamp-1">${plan.ofrtext}</span>
                </div>
                
                <div class="flex justify-between items-center border-t border-gray-100 pt-3">
                    <button onclick="toggleDetails(${index})" class="text-sm font-semibold text-brand hover:underline" id="toggle-btn-${index}">Show More</button>
                    <button onclick="selectPlan(${plan.price})" class="px-5 py-2 bg-brand text-white text-sm font-semibold rounded-full shadow-md hover:bg-brand-light transition-colors">Select</button>
                </div>

                <div id="plan-details-${index}" class="hidden mt-3 pt-3 border-t border-dashed border-gray-200">
                    <p class="text-sm text-gray-600 leading-relaxed">${plan.logdesc}</p>
                </div>
            </div>`;
            
            container.innerHTML += cardHtml;
        });
    }

    function toggleDetails(index) {
        const detailsDiv = document.getElementById(`plan-details-${index}`);
        const btn = document.getElementById(`toggle-btn-${index}`);
        
        if(detailsDiv.classList.contains('hidden')) {
            detailsDiv.classList.remove('hidden');
            btn.innerText = "Show Less";
        } else {
            detailsDiv.classList.add('hidden');
            btn.innerText = "Show More";
        }
    }

    function selectPlan(price) {
        document.getElementById('recharge-amount').value = price;
        closePlans();
    }

    // ==============================================================
    // RECHARGE EXECUTION LOGIC
    // ==============================================================
    async function handleRechargeSubmit(event) {
        event.preventDefault();

        const number = document.getElementById('mobile-number').value;
        const opCode = document.getElementById('operator-select').value;
        const amount = document.getElementById('recharge-amount').value;
        const btn = document.getElementById('submit-btn');
        const msgDiv = document.getElementById('api-message');

        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
        btn.disabled = true;
        msgDiv.classList.add('hidden');

        try {
            const orderId = 'ORD' + Math.floor(Math.random() * 1000000000);
            const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(`${BASE_URL}/recharge?apiKey=${API_KEY}&number=${number}&opCode=${opCode}&amount=${amount}&orderId=${orderId}`);

            const response = await fetch(proxyUrl);
            const result = await response.json();

            msgDiv.classList.remove('hidden');
            if(result.status === "success" || result.status === "pending" || result.msg) {
                msgDiv.className = "text-sm font-medium mb-4 p-3 bg-green-50 text-green-700 rounded-xl border border-green-200";
                msgDiv.innerHTML = `<i class="fa-solid fa-circle-check"></i> ${result.msg || 'Success!'}<br>Order ID: ${result.orderId || orderId}`;
                document.getElementById('recharge-form').reset();
            } else {
                msgDiv.className = "text-sm font-medium mb-4 p-3 bg-red-50 text-red-700 rounded-xl border border-red-200";
                msgDiv.innerHTML = `<i class="fa-solid fa-circle-xmark"></i> Failed: ${result.msg || 'Transaction failed.'}`;
            }

        } catch (error) {
            msgDiv.classList.remove('hidden');
            msgDiv.className = "text-sm font-medium mb-4 p-3 bg-red-50 text-red-700 rounded-xl border border-red-200";
            msgDiv.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> Network error. Please try again.';
        }

        btn.innerHTML = 'Proceed to Recharge';
        btn.disabled = false;
    }

    // ==============================================================
    // RAZORPAY INTEGRATION
    // ==============================================================
    function initiateRazorpayTopUp() {
        const amountPrompt = prompt("Enter amount to add to wallet (INR):", "500");
        if (amountPrompt && !isNaN(amountPrompt)) {
            var options = {
                "key": "YOUR_RAZORPAY_KEY", 
                "amount": amountPrompt * 100, 
                "currency": "INR",
                "name": "FinApp",
                "description": "Wallet Top-up",
                "handler": function (response){
                    alert("Wallet successfully topped up!");
                    let currentBal = parseFloat(document.getElementById('wallet-balance').innerText.replace('₹ ', ''));
                    document.getElementById('wallet-balance').innerText = '₹ ' + (currentBal + parseFloat(amountPrompt)).toFixed(2);
                },
                "theme": { "color": "#6C48FA" }
            };
            var rzp1 = new Razorpay(options);
            rzp1.open();
        }
    }
</script>

</body>
</html>
