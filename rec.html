<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinApp - Web Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: { brand: { DEFAULT: '#6C48FA', light: '#8E72FC', bg: '#F3F4F6' } }
                }
            }
        }
    </script>
    <style>
        body { background-color: #e5e7eb; }
        .app-container { max-width: 480px; margin: 0 auto; background-color: #F4F5F9; min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); overflow-x: hidden; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="app-container pb-20">
    
    <header class="bg-brand text-white px-6 pt-10 pb-20 rounded-b-3xl relative">
        <div class="flex justify-between items-center">
            <button onclick="goHome()" class="text-2xl"><i class="fa-solid fa-house"></i></button>
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-atom text-2xl"></i>
                <h1 class="text-xl font-semibold tracking-wide">Finapp</h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="relative w-8 h-8 rounded-full bg-gray-300 overflow-hidden border-2 border-white">
                    <img src="https://ui-avatars.com/api/?name=User&background=random" alt="User">
                </div>
            </div>
        </div>
    </header>

    <div class="px-5 -mt-12 relative z-10">
        <div class="bg-white rounded-2xl p-6 shadow-sm flex justify-between items-center">
            <div>
                <p class="text-gray-600 font-medium mb-1">Wallet Balance</p>
                <h2 class="text-3xl font-bold text-gray-900" id="wallet-balance">₹ 2562.50</h2>
            </div>
            <button onclick="initiateRazorpayTopUp()" class="w-14 h-14 bg-brand bg-opacity-10 text-brand rounded-2xl flex items-center justify-center text-3xl hover:bg-brand hover:text-white transition-colors">
                +
            </button>
        </div>
    </div>

    <main id="view-home" class="px-5 mt-5 relative z-10">
        <div class="bg-white rounded-2xl p-6 shadow-sm">
            <div class="grid grid-cols-4 gap-y-6 gap-x-2">
                
                <div onclick="openService('prepaid')" class="flex flex-col items-center gap-2 cursor-pointer hover:opacity-80 transition-opacity">
                    <div class="w-14 h-14 bg-brand text-white rounded-2xl flex items-center justify-center text-xl shadow-md"><i class="fa-solid fa-mobile-screen"></i></div>
                    <span class="text-xs font-medium text-gray-700 text-center">Prepaid</span>
                </div>

                <div onclick="openService('dth')" class="flex flex-col items-center gap-2 cursor-pointer hover:opacity-80 transition-opacity">
                    <div class="w-14 h-14 bg-brand text-white rounded-2xl flex items-center justify-center text-xl shadow-md"><i class="fa-solid fa-tv"></i></div>
                    <span class="text-xs font-medium text-gray-700 text-center">Dth</span>
                </div>

                <div onclick="openService('electricity')" class="flex flex-col items-center gap-2 cursor-pointer hover:opacity-80 transition-opacity">
                    <div class="w-14 h-14 bg-brand text-white rounded-2xl flex items-center justify-center text-xl shadow-md"><i class="fa-solid fa-bolt"></i></div>
                    <span class="text-xs font-medium text-gray-700 text-center">Electricity</span>
                </div>

                <div onclick="openService('fastag')" class="flex flex-col items-center gap-2 cursor-pointer hover:opacity-80 transition-opacity">
                    <div class="w-14 h-14 bg-brand text-white rounded-2xl flex items-center justify-center text-xl shadow-md"><i class="fa-solid fa-car"></i></div>
                    <span class="text-xs font-medium text-gray-700 text-center">FasTag</span>
                </div>

            </div>
        </div>
    </main>

    <main id="view-prepaid" class="px-5 mt-5 relative z-10 hidden">
        <div class="bg-white rounded-2xl p-6 shadow-sm">
            <div class="flex items-center gap-3 mb-6 border-b pb-4">
                <button onclick="goHome()" class="text-gray-500"><i class="fa-solid fa-arrow-left"></i></button>
                <h3 class="text-lg font-semibold text-gray-800">Mobile Recharge</h3>
            </div>

            <form id="recharge-form" onsubmit="handleRechargeSubmit(event)">
                
                <div class="mb-4">
                    <label class="block text-xs font-medium text-gray-500 mb-1">Mobile Number</label>
                    <input type="tel" id="mobile-number" required placeholder="Enter 10 digit number" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand">
                </div>

                <div class="mb-4">
                    <label class="block text-xs font-medium text-gray-500 mb-1">Select Operator</label>
                    <select id="operator-select" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-brand bg-white">
                        <option value="">Loading operators...</option>
                    </select>
                </div>

                <div class="mb-6">
                    <label class="block text-xs font-medium text-gray-500 mb-1">Amount (₹)</label>
                    <input type="number" id="recharge-amount" required placeholder="Enter Amount" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand">
                </div>

                <div id="api-message" class="text-sm font-medium mb-4 hidden"></div>

                <button type="submit" id="submit-btn" class="w-full bg-brand text-white py-3.5 rounded-xl font-semibold shadow-md shadow-brand/30 hover:bg-brand-light transition-colors">
                    Proceed to Recharge
                </button>
            </form>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full max-w-[480px] bg-white border-t border-gray-200 flex justify-between px-6 py-3 pb-6 rounded-t-2xl z-50">
        <div onclick="goHome()" class="flex flex-col items-center text-brand relative w-1/4 cursor-pointer">
            <i class="fa-solid fa-house text-xl mb-1 mt-2"></i>
            <span class="text-[10px] font-medium">Home</span>
        </div>
        <div class="flex flex-col items-center text-gray-400 hover:text-brand w-1/4 cursor-pointer transition-colors">
            <i class="fa-solid fa-file-invoice text-xl mb-1 mt-2"></i>
            <span class="text-[10px] font-medium">Margin</span>
        </div>
        <div class="flex flex-col items-center text-gray-400 hover:text-brand w-1/4 cursor-pointer transition-colors">
            <i class="fa-solid fa-credit-card text-xl mb-1 mt-2"></i>
            <span class="text-[10px] font-medium">History</span>
        </div>
    </nav>

</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
    // ==============================================================
    // CONFIGURATION - Replace with your actual OneAPI Key
    // ==============================================================
    const API_KEY = "your_api_key_here"; 
    const BASE_URL = "https://backend.oneapi.in";

    // View Management
    const viewHome = document.getElementById('view-home');
    const viewPrepaid = document.getElementById('view-prepaid');
    let operatorsLoaded = false;

    // Navigation functions
    function goHome() {
        viewPrepaid.classList.add('hidden');
        viewHome.classList.remove('hidden');
    }

    function openService(serviceName) {
        if(serviceName === 'prepaid') {
            viewHome.classList.add('hidden');
            viewPrepaid.classList.remove('hidden');
            
            // Fetch operators from OneAPI if we haven't already
            if(!operatorsLoaded) fetchOperators();
        } else {
            alert(serviceName.toUpperCase() + " service abhi ban rahi hai. Kripya 'Prepaid' test karein!");
        }
    }

    // ==============================================================
    // ONEAPI INTEGRATION LOGIC
    // ==============================================================

    // 1. Fetch Operators API
    async function fetchOperators() {
        const selectElement = document.getElementById('operator-select');
        selectElement.innerHTML = '<option value="">Fetching operators...</option>';

        try {
            const response = await fetch(`${BASE_URL}/recharge-related/opCode/list?apiKey=${API_KEY}`);
            const result = await response.json();

            if(result.status && result.data) {
                selectElement.innerHTML = '<option value="">-- Select Operator --</option>';
                // Map the returned object into select options
                for (const [operatorName, opCode] of Object.entries(result.data)) {
                    // Filter to just show mobile operators for this specific screen
                    if(['jio', 'airtel', 'vodafoneIdea', 'bsnlTopup', 'bsnlCombo'].includes(opCode)) {
                        let option = document.createElement('option');
                        option.value = opCode;
                        option.textContent = operatorName;
                        selectElement.appendChild(option);
                    }
                }
                operatorsLoaded = true;
            } else {
                selectElement.innerHTML = '<option value="">Failed to load operators</option>';
            }
        } catch (error) {
            console.error("Error fetching operators:", error);
            selectElement.innerHTML = '<option value="">Network error. Try again.</option>';
        }
    }

    // 2. Process Recharge API
    async function handleRechargeSubmit(event) {
        event.preventDefault(); // Stop form from refreshing the page

        const number = document.getElementById('mobile-number').value;
        const opCode = document.getElementById('operator-select').value;
        const amount = document.getElementById('recharge-amount').value;
        const btn = document.getElementById('submit-btn');
        const msgDiv = document.getElementById('api-message');

        // Basic validation
        if(number.length < 10) return alert("Please enter a valid 10-digit mobile number.");
        if(!opCode) return alert("Please select an operator.");

        // UI Update
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
        btn.disabled = true;
        msgDiv.classList.add('hidden');

        try {
            // Generate a random order ID for this transaction
            const orderId = 'ORD' + Math.floor(Math.random() * 1000000000);

            // Make the API Call to OneAPI
            const response = await fetch(`${BASE_URL}/recharge?apiKey=${API_KEY}&number=${number}&opCode=${opCode}&amount=${amount}&orderId=${orderId}`);
            const result = await response.json();

            // Display Success/Failure
            msgDiv.classList.remove('hidden');
            if(result.status === "success" || result.status === "pending") {
                msgDiv.className = "text-sm font-medium mb-4 p-3 bg-green-50 text-green-700 rounded-xl border border-green-200";
                msgDiv.innerHTML = `<i class="fa-solid fa-circle-check"></i> ${result.msg}<br>Order ID: ${result.orderId}`;
                document.getElementById('recharge-form').reset();
            } else {
                msgDiv.className = "text-sm font-medium mb-4 p-3 bg-red-50 text-red-700 rounded-xl border border-red-200";
                msgDiv.innerHTML = `<i class="fa-solid fa-circle-xmark"></i> Failed: ${result.msg || 'Transaction could not be completed.'}`;
            }

        } catch (error) {
            console.error("Recharge Error:", error);
            msgDiv.classList.remove('hidden');
            msgDiv.className = "text-sm font-medium mb-4 p-3 bg-red-50 text-red-700 rounded-xl border border-red-200";
            // YAHAN ERROR THI - Double quotes fixed to single quotes
            msgDiv.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> Network error. Please try again.';
        }

        // Reset UI
        btn.innerHTML = 'Proceed to Recharge';
        btn.disabled = false;
    }

    // ==============================================================
    // RAZORPAY INTEGRATION LOGIC
    // ==============================================================
    function initiateRazorpayTopUp() {
        const amountPrompt = prompt("Enter amount to add to wallet (INR):", "500");
        if (amountPrompt && !isNaN(amountPrompt)) {
            var options = {
                "key": "YOUR_RAZORPAY_KEY", 
                "amount": amountPrompt * 100, 
                "currency": "INR",
                "name": "FinApp",
                "description": "Wallet Top-up",
                "handler": function (response){
                    alert("Wallet successfully topped up! Payment ID: " + response.razorpay_payment_id);
                    // Update dummy wallet balance in UI
                    let currentBal = parseFloat(document.getElementById('wallet-balance').innerText.replace('₹ ', ''));
                    document.getElementById('wallet-balance').innerText = '₹ ' + (currentBal + parseFloat(amountPrompt)).toFixed(2);
                },
                "theme": { "color": "#6C48FA" }
            };
            var rzp1 = new Razorpay(options);
            rzp1.open();
        }
    }
</script>

</body>
</html>
