<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Live Meet</title>
    <!-- PeerJS CDN for WebRTC Signaling -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 15px 20px;
            background-color: var(--panel-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            z-index: 10;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent);
        }

        .meeting-info {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="text"] {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
            width: 250px;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            background-color: var(--accent);
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button.danger {
            background-color: var(--danger);
        }

        button.danger:hover {
            background-color: var(--danger-hover);
        }

        .main-container {
            flex: 1;
            display: flex;
            position: relative;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 1200px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Remote video takes full screen */
        #remoteVideo {
            width: 100%;
            height: 100%;
        }

        /* Local video is Picture-in-Picture */
        #localVideo {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: 150px;
            border-radius: 8px;
            border: 2px solid #334155;
            background: #1e293b;
            transform: scaleX(-1); /* Mirror effect */
        }

        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(30, 41, 59, 0.8);
            padding: 10px 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .control-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
        }

        .control-btn.disabled {
            background-color: var(--danger);
        }

        .status-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            color: var(--success);
            display: none;
        }

        .join-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 20;
        }

        .join-panel h2 {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">P2P Live Meet</div>
        <div class="meeting-info">
            <span style="font-size: 0.9rem; color: var(--text-muted);">Share Link:</span>
            <input type="text" id="inviteLink" readonly placeholder="Generating link...">
            <button id="copyBtn">Copy Link</button>
        </div>
    </header>

    <div class="main-container">
        
        <!-- Join Panel (Visible when not connected to remote) -->
        <div class="join-panel" id="joinPanel">
            <h2>Join a Meeting</h2>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <input type="text" id="targetIdInput" placeholder="Enter Meeting ID">
                <button id="joinBtn">Join Meeting</button>
            </div>
            <p style="margin-top: 15px; font-size: 0.85rem; color: var(--text-muted);">Or share your link from the top bar for others to join you.</p>
        </div>

        <div class="video-wrapper">
            <div class="status-badge" id="statusBadge">Connected E2E</div>
            <video id="remoteVideo" autoplay playsinline></video>
            <video id="localVideo" autoplay playsinline muted></video>
            
            <div class="controls">
                <button class="control-btn" id="toggleAudioBtn">Mic</button>
                <button class="control-btn" id="toggleVideoBtn">Cam</button>
                <button class="control-btn danger" id="endCallBtn">End</button>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const inviteLinkInput = document.getElementById('inviteLink');
        const copyBtn = document.getElementById('copyBtn');
        const targetIdInput = document.getElementById('targetIdInput');
        const joinBtn = document.getElementById('joinBtn');
        const joinPanel = document.getElementById('joinPanel');
        const statusBadge = document.getElementById('statusBadge');
        
        // Control Buttons
        const toggleAudioBtn = document.getElementById('toggleAudioBtn');
        const toggleVideoBtn = document.getElementById('toggleVideoBtn');
        const endCallBtn = document.getElementById('endCallBtn');

        // State variables
        let localStream;
        let peer;
        let currentCall;
        let myPeerId;

        // Initialize App
        async function init() {
            try {
                // 1. Get Local Media (Camera & Mic)
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localVideo.srcObject = localStream;

                // 2. Initialize PeerJS
                peer = new Peer({
                    config: {'iceServers': [
                        { url: 'stun:stun.l.google.com:19302' },
                        { url: 'stun:stun1.l.google.com:19302' }
                    ]}
                });

                // 3. PeerJS Event: Opened & connected to signaling server
                peer.on('open', (id) => {
                    myPeerId = id;
                    // Generate Link
                    const baseUrl = window.location.href.split('?')[0];
                    inviteLinkInput.value = `${baseUrl}?meet=${id}`;
                    
                    // Check if URL has a join parameter
                    checkUrlForJoin();
                });

                // 4. PeerJS Event: Receiving incoming call
                peer.on('call', (call) => {
                    // Answer the call automatically with our local stream
                    call.answer(localStream);
                    handleCallEvents(call);
                });

            } catch (error) {
                console.error("Error accessing media devices.", error);
                alert("Please allow camera and microphone access to use Live Meet.");
            }
        }

        // Call another peer
        function initiateCall(targetId) {
            if(!targetId) return;
            const call = peer.call(targetId, localStream);
            handleCallEvents(call);
        }

        // Manage call stream and connection drops
        function handleCallEvents(call) {
            currentCall = call;
            
            call.on('stream', (remoteStream) => {
                // Display remote stream
                remoteVideo.srcObject = remoteStream;
                joinPanel.style.display = 'none';
                statusBadge.style.display = 'block';
            });

            call.on('close', () => {
                endMeeting();
            });
            
            call.on('error', (err) => {
                console.error(err);
                endMeeting();
            });
        }

        // Check if user clicked a shared link
        function checkUrlForJoin() {
            const urlParams = new URLSearchParams(window.location.search);
            const targetMeetId = urlParams.get('meet');
            if (targetMeetId && targetMeetId !== myPeerId) {
                targetIdInput.value = targetMeetId;
                initiateCall(targetMeetId);
            }
        }

        // End Meeting & Cleanup
        function endMeeting() {
            if (currentCall) {
                currentCall.close();
            }
            remoteVideo.srcObject = null;
            joinPanel.style.display = 'block';
            statusBadge.style.display = 'none';
            // Clear URL parameter without reloading
            window.history.pushState({}, document.title, window.location.pathname);
        }

        // --- Event Listeners ---

        // Join button
        joinBtn.addEventListener('click', () => {
            const targetId = targetIdInput.value.trim();
            initiateCall(targetId);
        });

        // Copy Link logic
        copyBtn.addEventListener('click', () => {
            inviteLinkInput.select();
            document.execCommand('copy');
            copyBtn.innerText = 'Copied!';
            setTimeout(() => copyBtn.innerText = 'Copy Link', 2000);
        });

        // End Call button
        endCallBtn.addEventListener('click', endMeeting);

        // Toggle Audio
        toggleAudioBtn.addEventListener('click', () => {
            const audioTrack = localStream.getAudioTracks()[0];
            if (audioTrack) {
                audioTrack.enabled = !audioTrack.enabled;
                if(audioTrack.enabled) {
                    toggleAudioBtn.classList.remove('disabled');
                    toggleAudioBtn.innerText = 'Mic';
                } else {
                    toggleAudioBtn.classList.add('disabled');
                    toggleAudioBtn.innerText = 'Muted';
                }
            }
        });

        // Toggle Video
        toggleVideoBtn.addEventListener('click', () => {
            const videoTrack = localStream.getVideoTracks()[0];
            if (videoTrack) {
                videoTrack.enabled = !videoTrack.enabled;
                if(videoTrack.enabled) {
                    toggleVideoBtn.classList.remove('disabled');
                    toggleVideoBtn.innerText = 'Cam';
                } else {
                    toggleVideoBtn.classList.add('disabled');
                    toggleVideoBtn.innerText = 'No Cam';
                }
            }
        });

        // Start everything
        init();

    </script>
</body>
</html>
