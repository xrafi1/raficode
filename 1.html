<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I am cockroach 🪳</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');

  :root {
    --neon-green: #00ff41;
    --neon-red: #ff0040;
    --neon-cyan: #00f5ff;
    --neon-purple: #bf00ff;
    --bg: #000;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    cursor: crosshair;
  }

  #bg-canvas {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  #particle-canvas {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    pointer-events: none;
  }

  #roach-canvas {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 2;
    pointer-events: none;
  }

  .scene {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 800px;
    transform-style: preserve-3d;
  }

  .text-container {
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.1s ease-out;
  }

  .main-text {
    font-family: 'Orbitron', 'Courier New', monospace;
    font-weight: 900;
    font-size: clamp(2.5rem, 7vw, 7rem);
    text-align: center;
    letter-spacing: 0.05em;
    color: #fff;
    position: relative;
    z-index: 2;
    text-shadow:
      0 0 10px var(--neon-green),
      0 0 20px var(--neon-green),
      0 0 40px var(--neon-green),
      0 0 80px var(--neon-green),
      0 0 120px #00ff4188;
    animation: breathe 3s ease-in-out infinite, floatY 4s ease-in-out infinite, rgbCycle 6s linear infinite;
    filter: drop-shadow(0 0 30px var(--neon-green));
    user-select: none;
    -webkit-text-stroke: 1px rgba(0,255,65,0.3);
  }

  .main-text::before {
    content: 'I am cockroach 🪳';
    position: absolute; top: 0; left: 0; width: 100%;
    color: transparent;
    -webkit-text-stroke: 2px var(--neon-cyan);
    filter: blur(4px);
    animation: glitch1 4s infinite;
    z-index: -1;
  }

  .main-text::after {
    content: 'I am cockroach 🪳';
    position: absolute; top: 0; left: 0; width: 100%;
    color: transparent;
    -webkit-text-stroke: 2px var(--neon-red);
    filter: blur(3px);
    animation: glitch2 4s infinite;
    z-index: -1;
  }

  .glass-card {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 120%; height: 200%;
    background: radial-gradient(ellipse at center,
      rgba(0,255,65,0.03) 0%,
      rgba(0,0,0,0) 70%);
    border: 1px solid rgba(0,255,65,0.08);
    border-radius: 20px;
    backdrop-filter: blur(2px);
    z-index: 1;
    pointer-events: none;
    box-shadow:
      0 0 60px rgba(0,255,65,0.05),
      inset 0 0 60px rgba(0,255,65,0.02);
  }

  .scan-line {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 3px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(0,255,65,0.8) 50%,
      transparent 100%);
    z-index: 10;
    animation: scanDown 6s linear infinite;
    pointer-events: none;
    filter: blur(1px);
    box-shadow: 0 0 10px var(--neon-green);
  }

  .vignette {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at center,
      transparent 30%,
      rgba(0,0,0,0.7) 100%);
    z-index: 4;
    pointer-events: none;
  }

  .crt-overlay {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 5;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    animation: crtFlicker 0.15s infinite;
  }

  .glitch-bar {
    position: fixed;
    left: 0; width: 100%; height: 2px;
    background: var(--neon-red);
    z-index: 6;
    opacity: 0;
    pointer-events: none;
    animation: glitchBar 5s infinite;
    box-shadow: 0 0 8px var(--neon-red);
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }

  @keyframes floatY {
    0%, 100% { transform: translateY(0px) rotateX(0deg); }
    25% { transform: translateY(-12px) rotateX(2deg); }
    75% { transform: translateY(8px) rotateX(-1deg); }
  }

  @keyframes rgbCycle {
    0%   { text-shadow: 0 0 10px #00ff41, 0 0 30px #00ff41, 0 0 70px #00ff41, 0 0 120px #00ff4166; filter: drop-shadow(0 0 20px #00ff41); }
    20%  { text-shadow: 0 0 10px #00f5ff, 0 0 30px #00f5ff, 0 0 70px #00f5ff, 0 0 120px #00f5ff66; filter: drop-shadow(0 0 20px #00f5ff); }
    40%  { text-shadow: 0 0 10px #bf00ff, 0 0 30px #bf00ff, 0 0 70px #bf00ff, 0 0 120px #bf00ff66; filter: drop-shadow(0 0 20px #bf00ff); }
    60%  { text-shadow: 0 0 10px #ff0040, 0 0 30px #ff0040, 0 0 70px #ff0040, 0 0 120px #ff004066; filter: drop-shadow(0 0 20px #ff0040); }
    80%  { text-shadow: 0 0 10px #ffaa00, 0 0 30px #ffaa00, 0 0 70px #ffaa00, 0 0 120px #ffaa0066; filter: drop-shadow(0 0 20px #ffaa00); }
    100% { text-shadow: 0 0 10px #00ff41, 0 0 30px #00ff41, 0 0 70px #00ff41, 0 0 120px #00ff4166; filter: drop-shadow(0 0 20px #00ff41); }
  }

  @keyframes glitch1 {
    0%, 90%, 100% { transform: translate(0,0); opacity: 0.5; }
    91% { transform: translate(-4px, 2px); opacity: 0.8; }
    92% { transform: translate(4px, -2px); opacity: 0.3; }
    93% { transform: translate(-2px, 1px); opacity: 0.7; }
    94% { transform: translate(0, 0); opacity: 0; }
  }

  @keyframes glitch2 {
    0%, 85%, 100% { transform: translate(0,0); opacity: 0.5; }
    86% { transform: translate(5px, -1px); opacity: 0.6; }
    87% { transform: translate(-3px, 3px); opacity: 0.4; }
    88% { transform: translate(2px, -2px); opacity: 0.8; }
    89% { transform: translate(0, 0); opacity: 0; }
  }

  @keyframes scanDown {
    0% { top: -3px; opacity: 1; }
    80% { opacity: 0.6; }
    100% { top: 100%; opacity: 0; }
  }

  @keyframes crtFlicker {
    0%, 100% { opacity: 1; }
    98% { opacity: 0.97; }
    99% { opacity: 0.93; }
  }

  @keyframes glitchBar {
    0%, 100% { opacity: 0; top: 0; }
    10% { opacity: 0; }
    10.5% { opacity: 1; top: 30%; }
    11% { opacity: 0; }
    40% { opacity: 0; }
    40.5% { opacity: 0.8; top: 70%; height: 5px; }
    41% { opacity: 0; }
    70% { opacity: 0; }
    70.5% { opacity: 0.6; top: 50%; height: 1px; }
    71% { opacity: 0; }
  }

  #loading-screen {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: #000;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    transition: opacity 1s ease;
  }

  #loading-screen.fade-out {
    opacity: 0;
    pointer-events: none;
  }

  .loading-text {
    font-family: 'Orbitron', monospace;
    color: var(--neon-green);
    font-size: 1.2rem;
    letter-spacing: 0.3em;
    animation: loadingPulse 0.8s ease-in-out infinite;
  }

  .loading-bar-outer {
    width: 300px; height: 3px;
    background: rgba(0,255,65,0.2);
    border-radius: 2px;
    overflow: hidden;
  }

  .loading-bar-inner {
    height: 100%;
    background: var(--neon-green);
    box-shadow: 0 0 10px var(--neon-green);
    animation: loadBar 1.8s ease-in-out forwards;
  }

  @keyframes loadingPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  @keyframes loadBar {
    0% { width: 0%; }
    100% { width: 100%; }
  }
</style>
</head>
<body>

<div id="loading-screen">
  <div class="loading-text">INITIALIZING COCKROACH PROTOCOL...</div>
  <div class="loading-bar-outer"><div class="loading-bar-inner"></div></div>
</div>

<canvas id="bg-canvas"></canvas>
<canvas id="particle-canvas"></canvas>
<canvas id="roach-canvas"></canvas>

<div class="scan-line"></div>
<div class="glitch-bar"></div>
<div class="vignette"></div>
<div class="crt-overlay"></div>

<div class="scene" id="scene">
  <div class="text-container" id="textContainer">
    <div class="glass-card"></div>
    <div class="main-text" id="mainText">I am cockroach 🪳</div>
  </div>
</div>

<script>
// ── Audio Engine ──────────────────────────────────────────────────────────────
let audioCtx = null;
let masterGain;

function initAudio() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.3;
    masterGain.connect(audioCtx.destination);
    playIntroThud();
    startAmbient();
    scheduleRoachSounds();
  } catch(e) {}
}

function playIntroThud() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const dist = audioCtx.createWaveShaper();

  const curve = new Float32Array(256);
  for (let i = 0; i < 256; i++) {
    const x = (i * 2) / 256 - 1;
    curve[i] = (Math.PI + 400) * x / (Math.PI + 400 * Math.abs(x));
  }
  dist.curve = curve;

  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(80, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 1.5);

  gain.gain.setValueAtTime(0, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0.8, audioCtx.currentTime + 0.05);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2);

  osc.connect(dist);
  dist.connect(gain);
  gain.connect(masterGain);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 2);
}

function startAmbient() {
  if (!audioCtx) return;
  function makeAmbientLayer(freq, detune, vol) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 400;

    osc.type = 'sine';
    osc.frequency.value = freq;
    osc.detune.value = detune;
    gain.gain.value = vol;

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);
    osc.start();

    function wobble() {
      osc.detune.linearRampToValueAtTime(
        detune + (Math.random() - 0.5) * 20,
        audioCtx.currentTime + 2 + Math.random() * 3
      );
      setTimeout(wobble, 2000 + Math.random() * 3000);
    }
    wobble();
  }
  makeAmbientLayer(40, 0, 0.15);
  makeAmbientLayer(60, -5, 0.08);
  makeAmbientLayer(120, 10, 0.04);
}

function playCrawlSound() {
  if (!audioCtx) return;
  const bufSize = audioCtx.sampleRate * 0.3;
  const buffer = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 2) * 0.3;
  }
  const src = audioCtx.createBufferSource();
  const filter = audioCtx.createBiquadFilter();
  const gain = audioCtx.createGain();
  filter.type = 'bandpass';
  filter.frequency.value = 800 + Math.random() * 2000;
  filter.Q.value = 5;
  gain.gain.value = 0.4;
  src.buffer = buffer;
  src.connect(filter);
  filter.connect(gain);
  gain.connect(masterGain);
  src.start();
}

function scheduleRoachSounds() {
  function next() {
    setTimeout(() => {
      playCrawlSound();
      next();
    }, 2000 + Math.random() * 6000);
  }
  next();
}

function playHoverDistort() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(200 + Math.random() * 300, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.15);
  gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.15);
}

// ── Background Canvas (animated rooms + gradients) ────────────────────────────
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx = bgCanvas.getContext('2d');
let bgTime = 0;

function resizeBg() {
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
}
resizeBg();

function drawBg() {
  const W = bgCanvas.width, H = bgCanvas.height;
  bgTime += 0.005;

  // Dark base
  bgCtx.fillStyle = '#000';
  bgCtx.fillRect(0, 0, W, H);

  // Animated gradient nebula
  const cx = W / 2, cy = H / 2;
  const r1 = Math.sin(bgTime * 0.7) * 0.5 + 0.5;
  const r2 = Math.cos(bgTime * 0.5) * 0.5 + 0.5;

  const grad1 = bgCtx.createRadialGradient(cx + Math.sin(bgTime) * 100, cy + Math.cos(bgTime) * 60, 10, cx, cy, W * 0.8);
  grad1.addColorStop(0, `rgba(0,${Math.floor(80 + r1 * 60)},${Math.floor(20 + r1 * 40)},0.15)`);
  grad1.addColorStop(0.4, `rgba(${Math.floor(r2 * 40)},0,${Math.floor(r2 * 60)},0.08)`);
  grad1.addColorStop(1, 'rgba(0,0,0,0)');
  bgCtx.fillStyle = grad1;
  bgCtx.fillRect(0, 0, W, H);

  // Sci-fi floor grid
  bgCtx.save();
  bgCtx.globalAlpha = 0.06 + Math.sin(bgTime * 2) * 0.02;
  bgCtx.strokeStyle = '#00ff41';
  bgCtx.lineWidth = 0.5;

  const gridOff = (bgTime * 20) % 60;
  bgCtx.beginPath();
  for (let x = 0; x < W; x += 60) {
    bgCtx.moveTo(x, 0); bgCtx.lineTo(x, H);
  }
  for (let y = -gridOff; y < H; y += 60) {
    bgCtx.moveTo(0, y); bgCtx.lineTo(W, y);
  }
  bgCtx.stroke();
  bgCtx.restore();

  // Corner ambient lights
  const corners = [[0,0],[W,0],[0,H],[W,H]];
  corners.forEach(([cx2, cy2], i) => {
    const pulse = Math.sin(bgTime * 1.5 + i) * 0.5 + 0.5;
    const cg = bgCtx.createRadialGradient(cx2, cy2, 0, cx2, cy2, W * 0.4);
    cg.addColorStop(0, `rgba(0,${Math.floor(20 + pulse * 30)},0,${0.12 + pulse * 0.06})`);
    cg.addColorStop(1, 'rgba(0,0,0,0)');
    bgCtx.fillStyle = cg;
    bgCtx.fillRect(0, 0, W, H);
  });

  // Vertical scan light
  const scanX = (bgTime * 40) % (W + 200) - 100;
  const scanGrad = bgCtx.createLinearGradient(scanX - 60, 0, scanX + 60, 0);
  scanGrad.addColorStop(0, 'rgba(0,255,65,0)');
  scanGrad.addColorStop(0.5, `rgba(0,255,65,0.04)`);
  scanGrad.addColorStop(1, 'rgba(0,255,65,0)');
  bgCtx.fillStyle = scanGrad;
  bgCtx.fillRect(0, 0, W, H);

  requestAnimationFrame(drawBg);
}
drawBg();

// ── Particle Canvas (dust / smoke) ────────────────────────────────────────────
const pCanvas = document.getElementById('particle-canvas');
const pCtx = pCanvas.getContext('2d');

function resizeP() {
  pCanvas.width = window.innerWidth;
  pCanvas.height = window.innerHeight;
}
resizeP();

const particles = [];
for (let i = 0; i < 180; i++) {
  particles.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    vx: (Math.random() - 0.5) * 0.4,
    vy: -Math.random() * 0.5 - 0.1,
    size: Math.random() * 2.5 + 0.3,
    alpha: Math.random() * 0.5 + 0.1,
    hue: Math.random() < 0.7 ? 120 : (Math.random() < 0.5 ? 180 : 300),
    life: Math.random(),
    decay: Math.random() * 0.002 + 0.001,
  });
}

let pTime = 0;
function drawParticles() {
  pTime += 0.01;
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);

  particles.forEach(p => {
    p.x += p.vx + Math.sin(pTime + p.y * 0.01) * 0.3;
    p.y += p.vy;
    p.life -= p.decay;

    if (p.life <= 0 || p.y < 0) {
      p.x = Math.random() * pCanvas.width;
      p.y = pCanvas.height + 10;
      p.life = 0.8 + Math.random() * 0.4;
      p.vx = (Math.random() - 0.5) * 0.4;
      p.vy = -Math.random() * 0.5 - 0.1;
    }

    const fade = Math.min(p.life * 3, 1);
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    pCtx.fillStyle = `hsla(${p.hue}, 100%, 60%, ${p.alpha * fade})`;
    pCtx.fill();

    // Glow
    const grd = pCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 4);
    grd.addColorStop(0, `hsla(${p.hue}, 100%, 60%, ${p.alpha * 0.3 * fade})`);
    grd.addColorStop(1, 'transparent');
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * 4, 0, Math.PI * 2);
    pCtx.fillStyle = grd;
    pCtx.fill();
  });

  requestAnimationFrame(drawParticles);
}
drawParticles();

// ── Cockroach Canvas ──────────────────────────────────────────────────────────
const rCanvas = document.getElementById('roach-canvas');
const rCtx = rCanvas.getContext('2d');

function resizeR() {
  rCanvas.width = window.innerWidth;
  rCanvas.height = window.innerHeight;
}
resizeR();

class Cockroach {
  constructor() { this.reset(true); }

  reset(init = false) {
    const W = rCanvas.width, H = rCanvas.height;
    const edge = Math.floor(Math.random() * 4);
    if (edge === 0) { this.x = Math.random() * W; this.y = -30; }
    else if (edge === 1) { this.x = W + 30; this.y = Math.random() * H; }
    else if (edge === 2) { this.x = Math.random() * W; this.y = H + 30; }
    else { this.x = -30; this.y = Math.random() * H; }

    if (init) { this.x = Math.random() * W; this.y = Math.random() * H; }

    this.targetX = Math.random() * W;
    this.targetY = Math.random() * H;
    this.speed = 0.8 + Math.random() * 2;
    this.size = 18 + Math.random() * 22;
    this.angle = Math.atan2(this.targetY - this.y, this.targetX - this.x);
    this.legPhase = Math.random() * Math.PI * 2;
    this.legSpeed = 0.25 + Math.random() * 0.2;
    this.alpha = 0.5 + Math.random() * 0.5;
    this.scurryTimer = 0;
    this.scurryInterval = 60 + Math.random() * 120;
    this.alive = true;
    this.fear = false;
  }

  update() {
    this.scurryTimer++;
    if (this.scurryTimer > this.scurryInterval) {
      const W = rCanvas.width, H = rCanvas.height;
      this.targetX = Math.random() * W;
      this.targetY = Math.random() * H;
      this.angle = Math.atan2(this.targetY - this.y, this.targetX - this.x);
      this.scurryTimer = 0;
      this.scurryInterval = 60 + Math.random() * 120;
      if (Math.random() < 0.3) this.speed = 3 + Math.random() * 3;
    }

    const dx = this.targetX - this.x, dy = this.targetY - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 5) {
      const W = rCanvas.width, H = rCanvas.height;
      this.targetX = Math.random() * W;
      this.targetY = Math.random() * H;
    }

    const targetAngle = Math.atan2(dy, dx);
    let da = targetAngle - this.angle;
    while (da > Math.PI) da -= 2 * Math.PI;
    while (da < -Math.PI) da += 2 * Math.PI;
    this.angle += da * 0.08;

    this.x += Math.cos(this.angle) * this.speed;
    this.y += Math.sin(this.angle) * this.speed;
    this.legPhase += this.legSpeed;

    const pad = 60;
    if (this.x < -pad || this.x > rCanvas.width + pad ||
        this.y < -pad || this.y > rCanvas.height + pad) {
      this.reset();
    }
    this.speed = Math.max(0.8, this.speed * 0.99);
  }

  draw() {
    rCtx.save();
    rCtx.translate(this.x, this.y);
    rCtx.rotate(this.angle + Math.PI / 2);
    rCtx.globalAlpha = this.alpha;
    const s = this.size;

    // Shadow
    rCtx.save();
    rCtx.translate(3, 3);
    rCtx.globalAlpha = this.alpha * 0.3;
    rCtx.fillStyle = '#000';
    this._drawBody(s);
    rCtx.restore();

    this._drawLegs(s);
    this._drawBody(s);
    this._drawAntennae(s);

    rCtx.restore();
  }

  _drawBody(s) {
    // Abdomen
    rCtx.beginPath();
    rCtx.ellipse(0, s * 0.3, s * 0.38, s * 0.55, 0, 0, Math.PI * 2);
    const abGrad = rCtx.createRadialGradient(-s*0.1, s*0.1, 0, 0, s*0.3, s*0.5);
    abGrad.addColorStop(0, '#4a3520');
    abGrad.addColorStop(0.4, '#2a1e0e');
    abGrad.addColorStop(1, '#0a0805');
    rCtx.fillStyle = abGrad;
    rCtx.fill();

    // Stripe segments
    for (let i = 0; i < 4; i++) {
      rCtx.beginPath();
      rCtx.ellipse(0, s * 0.05 + i * s * 0.17, s * 0.35 - i * 0.01, s * 0.04, 0, 0, Math.PI * 2);
      rCtx.fillStyle = `rgba(${60 + i * 5},${40 + i * 3},${10},0.4)`;
      rCtx.fill();
    }

    // Pronotum (head shield)
    rCtx.beginPath();
    rCtx.ellipse(0, -s * 0.32, s * 0.36, s * 0.28, 0, 0, Math.PI * 2);
    const pGrad = rCtx.createRadialGradient(-s*0.08, -s*0.38, 0, 0, -s*0.32, s*0.35);
    pGrad.addColorStop(0, '#5a4025');
    pGrad.addColorStop(1, '#1a100a');
    rCtx.fillStyle = pGrad;
    rCtx.fill();

    // Head
    rCtx.beginPath();
    rCtx.ellipse(0, -s * 0.65, s * 0.18, s * 0.16, 0, 0, Math.PI * 2);
    rCtx.fillStyle = '#1a0e08';
    rCtx.fill();

    // Eyes
    [-1, 1].forEach(side => {
      rCtx.beginPath();
      rCtx.arc(side * s * 0.1, -s * 0.68, s * 0.045, 0, Math.PI * 2);
      rCtx.fillStyle = '#ff2200';
      rCtx.fill();
      rCtx.beginPath();
      rCtx.arc(side * s * 0.1 + side * s * 0.01, -s * 0.68, s * 0.02, 0, Math.PI * 2);
      rCtx.fillStyle = '#ff8844';
      rCtx.fill();
    });

    // Shine
    rCtx.beginPath();
    rCtx.ellipse(-s * 0.08, -s * 0.38, s * 0.1, s * 0.06, -0.3, 0, Math.PI * 2);
    rCtx.fillStyle = 'rgba(180,140,80,0.15)';
    rCtx.fill();
  }

  _drawLegs(s) {
    const lp = this.legPhase;
    const legPairs = [
      { y: -s * 0.15, spread: s * 0.42 },
      { y: s * 0.1,   spread: s * 0.48 },
      { y: s * 0.35,  spread: s * 0.44 },
    ];
    legPairs.forEach(({ y, spread }, pi) => {
      [-1, 1].forEach(side => {
        const swing = Math.sin(lp + pi * 1.05 + (side > 0 ? Math.PI : 0)) * s * 0.18;
        rCtx.beginPath();
        rCtx.moveTo(side * s * 0.3, y);
        const mx = side * (spread * 0.6 + Math.abs(swing) * 0.5);
        const my = y - s * 0.05 + swing * 0.3;
        const ex = side * (spread + swing * 0.4);
        const ey = y + s * 0.15 + swing * 0.6;
        rCtx.quadraticCurveTo(mx, my, ex, ey);
        rCtx.strokeStyle = 'rgba(50,35,15,0.85)';
        rCtx.lineWidth = s * 0.035;
        rCtx.lineCap = 'round';
        rCtx.stroke();
      });
    });
  }

  _drawAntennae(s) {
    const lp = this.legPhase;
    [-1, 1].forEach(side => {
      const wave = Math.sin(lp * 0.6 + side) * s * 0.2;
      rCtx.beginPath();
      rCtx.moveTo(side * s * 0.1, -s * 0.75);
      rCtx.bezierCurveTo(
        side * s * 0.25, -s * 1.0,
        side * s * 0.5 + wave, -s * 1.3,
        side * s * 0.6 + wave * 1.4, -s * 1.6
      );
      rCtx.strokeStyle = 'rgba(60,40,15,0.7)';
      rCtx.lineWidth = s * 0.025;
      rCtx.lineCap = 'round';
      rCtx.stroke();
    });
  }

  scurryAway(mx, my) {
    const dx = this.x - mx, dy = this.y - my;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 150) {
      this.targetX = this.x + dx / dist * 300;
      this.targetY = this.y + dy / dist * 300;
      this.angle = Math.atan2(dy, dx);
      this.speed = 4 + Math.random() * 3;
    }
  }
}

const roaches = Array.from({ length: 12 }, () => new Cockroach());
let rTime = 0;

function drawRoaches() {
  rTime++;
  rCtx.clearRect(0, 0, rCanvas.width, rCanvas.height);
  roaches.forEach(r => { r.update(); r.draw(); });
  requestAnimationFrame(drawRoaches);
}
drawRoaches();

// ── Mouse Parallax ────────────────────────────────────────────────────────────
let mouseX = 0, mouseY = 0;
let smoothX = 0, smoothY = 0;
const textContainer = document.getElementById('textContainer');
const scene = document.getElementById('scene');

document.addEventListener('mousemove', e => {
  mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
  mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
  roaches.forEach(r => r.scurryAway(e.clientX, e.clientY));
});

document.addEventListener('touchmove', e => {
  const t = e.touches[0];
  mouseX = (t.clientX / window.innerWidth - 0.5) * 2;
  mouseY = (t.clientY / window.innerHeight - 0.5) * 2;
});

function updateParallax() {
  smoothX += (mouseX - smoothX) * 0.05;
  smoothY += (mouseY - smoothY) * 0.05;
  textContainer.style.transform =
    `rotateY(${smoothX * 12}deg) rotateX(${-smoothY * 8}deg) translateZ(20px)`;
  requestAnimationFrame(updateParallax);
}
updateParallax();

// ── Hover sound ───────────────────────────────────────────────────────────────
document.getElementById('mainText').addEventListener('mouseenter', () => {
  playHoverDistort();
});

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  resizeBg(); resizeP(); resizeR();
});

// ── Init on first interaction ─────────────────────────────────────────────────
let started = false;
function start() {
  if (started) return;
  started = true;
  initAudio();
  setTimeout(() => {
    const ls = document.getElementById('loading-screen');
    ls.classList.add('fade-out');
    setTimeout(() => ls.style.display = 'none', 1200);
  }, 1900);
}

document.addEventListener('click', start);
document.addEventListener('touchstart', start);
document.addEventListener('keydown', start);
setTimeout(start, 2500); // auto-start if no interaction
</script>
